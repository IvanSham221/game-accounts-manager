<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить аккаунт - Менеджер игровых аккаунтов</title>
    <link rel="stylesheet" href="style.css?v=20250115">
    <style>
        /* Добавим стиль для синей кнопки, если его нет в style.css */
        .btn-info {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: white;
        }
        .btn-info:hover {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
        }
    </style>
</head>
<body>
    <div id="mobileMenu" class="mobile-menu">
    <div class="mobile-menu-header">
        <div class="user-info-mobile">
            <div class="user-avatar">👤</div>
            <div>
                <div class="user-name" id="mobileUserName"></div>
                <div class="user-role" id="mobileUserRole"></div>
            </div>
        </div>
        <button class="close-menu" onclick="toggleMobileMenu()">×</button>
    </div>
    
    <div class="mobile-menu-nav">
        <!-- Пункты меню будут добавляться скриптом -->
    </div>
    
    <div class="mobile-menu-footer">
        <button onclick="logout()" class="btn btn-danger btn-block">
            <span>🚪</span> Выйти
        </button>
    </div>
</div>

<!-- Бургер-кнопка -->
<div class="burger-container">
    <button class="burger-btn" onclick="toggleMobileMenu()" title="Открыть меню">
        <div class="burger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <!-- Опционально: бейдж с уведомлениями -->
        <div class="burger-badge" id="menuBadge" style="display: none;">3</div>
        <!-- Текст при наведении (только на ПК) -->
        <div class="burger-label">Меню</div>
    </button>
</div>

<!-- Оверлей для закрытия меню -->
<div id="menuOverlay" class="menu-overlay" onclick="toggleMobileMenu()"></div>
    <div class="container">
        <h1><span>🎮</span><span>Добавить игровой аккаунт</span></h1>
        

        <div class="section">
            <h2>👤 Добавить новый аккаунт</h2>
            <div class="form-grid">
                <select id="accountGame" class="input" required>
                    <option value="">Выберите игру</option>
                </select>
                <input type="number" id="purchaseAmount" placeholder="Сумма закупа" class="input" step="0.01">
                <input type="text" id="psnLogin" placeholder="Логин PSN" class="input">
                <input type="text" id="psnPassword" placeholder="Пароль PSN" class="input">
                <input type="email" id="email" placeholder="Почта" class="input">
                <input type="text" id="emailPassword" placeholder="Пароль от почты" class="input">
                <input type="email" id="backupEmail" placeholder="Резервная почта" class="input">
                <input type="text" id="birthDate" placeholder="Дата рождения" class="input">
                <input type="text" id="psnCodes" placeholder="Коды PSN" class="input">
                <input type="text" id="psnAuthenticator" placeholder="PSN Аутентификатор" class="input">
                
                <div class="positions-section" style="grid-column: 1 / -1;">
                    <h3>Количество позиций:</h3>
                    <div class="positions-grid">
                        <label>П2 PS4: <input type="number" id="p2_ps4" class="input-small" value="0" min="0"></label>
                        <label>П3 PS4: <input type="number" id="p3_ps4" class="input-small" value="0" min="0"></label>
                        <label>П2 PS5: <input type="number" id="p2_ps5" class="input-small" value="0" min="0"></label>
                        <label>П3 PS5: <input type="number" id="p3_ps5" class="input-small" value="0" min="0"></label>
                    </div>
                </div>
                
                <!-- 🔥 НОВАЯ КНОПКА: Вставить из буфера -->
                <button type="button" class="btn btn-info" onclick="pasteFromClipboard()" style="grid-column: 1 / -1; margin-bottom: 10px;">
                    📋 Вставить из буфера
                </button>
                
                <button onclick="addAccount()" class="btn btn-success" style="grid-column: 1 / -1;">Добавить аккаунт</button>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase.js"></script>
    <script src="security.js"></script>
    <script src="script.js?v=20250115"></script>
    <script src="autocomplete.js"></script>
</body>
</html>
