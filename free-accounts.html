<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свободные аккаунты - Менеджер игровых аккаунтов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="mobileMenu" class="mobile-menu">
    <div class="mobile-menu-header">
        <div class="user-info-mobile">
            <div class="user-avatar">👤</div>
            <div>
                <div class="user-name" id="mobileUserName"></div>
                <div class="user-role" id="mobileUserRole"></div>
            </div>
        </div>
        <button class="close-menu" onclick="toggleMobileMenu()">×</button>
    </div>
    
    <div class="mobile-menu-nav">
    </div>
    
    <div class="mobile-menu-footer">
        <button onclick="logout()" class="btn btn-danger btn-block">
            <span>🚪</span> Выйти
        </button>
    </div>
</div>
<div class="burger-container">
    <button class="burger-btn" onclick="toggleMobileMenu()" title="Открыть меню">
        <div class="burger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="burger-badge" id="menuBadge" style="display: none;">3</div>
        <div class="burger-label">Меню</div>
    </button>
</div>
<div id="menuOverlay" class="menu-overlay" onclick="toggleMobileMenu()"></div>
    <div class="container">
        <h1><span>🆓</span><span>Свободные аккаунты</span></h1>
        <div class="section">
            <h2>👥 Аккаунты без привязки к игре</h2>
            <div id="freeAccountsList" class="accounts-grid"></div>
        </div>
    </div>

    <div id="editFreeModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeFreeModal()">&times;</span>
            <h2>🎮 Привязать игру к аккаунту</h2>
            <div id="editFreeForm" class="form-grid"></div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase.js"></script>
    <script src="security.js"></script>
    <script src="script.js?v=20250115"></script>
</body>
</html>
