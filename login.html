<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Менеджер аккаунтов</title>
    <link rel="stylesheet" href="style.css?v=20250115">
</head>
<body>
    <div class="login-container">
        <div class="login-form">
            <h1>🔐 Вход в систему</h1>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Логин:</label>
                    <input type="text" id="username" required class="input" placeholder="Логин">
                </div>
                
                <div class="input-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" required class="input" placeholder="Пароль">
                </div>
                
                <div id="loginError" class="error-message" style="display: none;"></div>
                
                <button type="submit" class="btn btn-primary btn-block">Войти</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase.js"></script>
    <script src="security.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
    if (security.isSessionValid()) {
        window.location.href = 'manager.html';
        return;
    }
    
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');
        const btn = this.querySelector('button[type="submit"]');
        
        if (!username || !password) {
            errorDiv.textContent = 'Заполните все поля';
            errorDiv.style.display = 'block';
            return;
        }
        
        btn.disabled = true;
        btn.textContent = 'Вход...';
        const result = await security.validateLogin(username, password);
        
        if (result.success) {
            security.startSession(result.user);
            if (window.dataSync && window.dataSync.forceFullSync) {
                await window.dataSync.forceFullSync();
            }
            
            window.location.href = 'manager.html';
        } else {
            errorDiv.textContent = result.error || 'Неверный логин или пароль';
            errorDiv.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Войти';
        }
    });
});
</script>
    <style>
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .login-form {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
    </style>
</body>
</html>
