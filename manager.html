<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Менеджер аккаунтов - Менеджер игровых аккаунтов</title>
    <link rel="stylesheet" href="style.css?v=20250115">
</head>
<body>
    <div id="mobileMenu" class="mobile-menu">
    <div class="mobile-menu-header">
        <div class="user-info-mobile">
            <div class="user-avatar">👤</div>
            <div>
                <div class="user-name" id="mobileUserName"></div>
                <div class="user-role" id="mobileUserRole"></div>
            </div>
        </div>
        <button class="close-menu" onclick="toggleMobileMenu()">×</button>
    </div>
    
    <div class="mobile-menu-nav">
        <!-- Пункты меню будут добавляться скриптом -->
    </div>
    
    <div class="mobile-menu-footer">
        <button onclick="logout()" class="btn btn-danger btn-block">
            <span>🚪</span> Выйти
        </button>
    </div>
</div>

<!-- Бургер-кнопка -->
<div class="burger-container">
    <button class="burger-btn" onclick="toggleMobileMenu()" title="Открыть меню">
        <div class="burger-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <!-- Опционально: бейдж с уведомлениями -->
        <div class="burger-badge" id="menuBadge" style="display: none;">3</div>
        <!-- Текст при наведении (только на ПК) -->
        <div class="burger-label">Меню</div>
    </button>
</div>

<!-- Оверлей для закрытия меню -->
<div id="menuOverlay" class="menu-overlay" onclick="toggleMobileMenu()"></div>
    <div class="container">
        <h1><span>👨‍💼</span><span>Месси позор общества</span></h1>
        <div class="section">
    <h2>🎯 Поиск аккаунтов</h2>
    <div class="search-container">
        <div class="search-group" style="width: 100%;">
            <label>🔍 Поиск:</label>
           <div style="display: flex; gap: 10px; width: 100%;">
                <input type="text" 
                    id="managerGameSearch" 
                    placeholder="Введите название игры или логин PSN..." 
                    class="input unified-search"
                    style="width: 75%;">
                <button onclick="performUnifiedSearch()" 
                        class="btn btn-primary" 
                        style="width: 25%;">
                    Найти
                </button>
            </div>
        </div>
        
        <!-- Старое поле для поиска по логину скрываем -->
        <div class="search-group" style="display: none;">
            <label>Поиск по логину:</label>
            <input type="text" id="managerLogin" placeholder="Введите логин PSN..." class="input">
            <button onclick="searchByLogin()" class="btn btn-primary">Найти по логину</button>
        </div>
    </div>
</div>

        <div id="statsSection" class="stats-section" style="display: none;"></div>

        <div class="section">
            <h2>📊 Результаты поиска</h2>
            <div id="toggleButtonContainer" style="margin-bottom: 20px; display: flex; justify-content: flex-end; display: none;">
        <button id="toggleSoldAccountsBtn" 
                class="btn btn-secondary" 
                onclick="toggleShowAllAccounts()"
                style="display: flex; align-items: center; gap: 8px; font-weight: 600;">
            <span id="toggleBtnIcon">👁️</span>
            <span id="toggleBtnText">Показать все</span>
        </button>
    </div>
            <div id="searchResults" class="accounts-grid-horizontal"></div>
        </div>
    </div>

    <div id="saleModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAnyModal('saleModal')">&times;</span>
            <div id="saleModalContent"></div>
        </div>
    </div>
    <div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeAnyModal('editModal')">&times;</span>
        <h2>✏️ Редактировать аккаунт</h2>
        <div id="editForm" class="form-grid"></div>
    </div>
</div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase.js"></script>
    <script src="security.js"></script>
    <script src="script.js?v=20250115"></script>
    <script src="autocomplete.js"></script>
    <script src="totp.js"></script>
</body>
</html>
