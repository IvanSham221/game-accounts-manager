<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Закуп - PlayStation Accounts CRM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="burger-container">
        <button class="burger-btn" onclick="toggleMobileMenu()">
            <div class="burger-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>
    </div>
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-header">
            <div class="user-info-mobile">
                <div class="user-avatar" id="mobileUserAvatar">U</div>
                <div>
                    <div class="user-name" id="mobileUserName"></div>
                    <div class="user-role" id="mobileUserRole"></div>
                </div>
            </div>
            <button class="close-menu" onclick="closeMobileMenu()">&times;</button>
        </div>
        
        <nav class="mobile-menu-nav">
        </nav>
        
        <div class="mobile-menu-footer">
            <button onclick="security.logout()" class="btn btn-danger btn-block">
                <i class="fas fa-sign-out-alt"></i> Выйти
            </button>
        </div>
    </div>
    
    <div class="menu-overlay" id="menuOverlay" onclick="closeMobileMenu()"></div>

    <div class="container">
        <h1><span>📦</span> Управление <span>закупом</span></h1>
        <div class="section">
            <h2><i class="fas fa-exclamation-triangle"></i> Критические позиции</h2>
            <div class="stats-cards" id="criticalPositions">
            </div>
            
            <div id="criticalList" class="critical-list">
            </div>
        </div>
    </div>
    <div id="gameDetailsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('gameDetailsModal')">&times;</span>
            <div id="gameDetailsContent">
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase.js"></script>
    <script src="security.js"></script>
    <script src="script.js?v=20250115"></script>
    <script src="autocomplete.js"></script>
    <script src="procurement.js"></script>
</body>
</html>
