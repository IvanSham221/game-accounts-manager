<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отчеты - Менеджер игровых аккаунтов</title>
    <link rel="stylesheet" href="style.css?v=20250115">
</head>
<body>
    <div id="mobileMenu" class="mobile-menu">
        <div class="mobile-menu-header">
            <div class="user-info-mobile">
                <div class="user-avatar">👤</div>
                <div>
                    <div class="user-name" id="mobileUserName"></div>
                    <div class="user-role" id="mobileUserRole"></div>
                </div>
            </div>
            <button class="close-menu" onclick="toggleMobileMenu()">×</button>
        </div>
        
        <div class="mobile-menu-nav">
            <!-- Пункты меню будут добавляться скриптом -->
        </div>
        
        <div class="mobile-menu-footer">
            <button onclick="logout()" class="btn btn-danger btn-block">
                <span>🚪</span> Выйти
            </button>
        </div>
    </div>

    <!-- Бургер-кнопка -->
    <div class="burger-container">
        <button class="burger-btn" onclick="toggleMobileMenu()" title="Открыть меню">
            <div class="burger-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="burger-badge" id="menuBadge" style="display: none;">3</div>
            <div class="burger-label">Меню</div>
        </button>
    </div>

    <!-- Оверлей для закрытия меню -->
    <div id="menuOverlay" class="menu-overlay" onclick="toggleMobileMenu()"></div>

    <div class="container">
        <h1><span>📊</span><span>Отчеты и статистика</span></h1>
        
        <!-- Сразу показываем статистику -->
        <div id="reportResults">
            <div style="text-align: center; padding: 40px; color: #64748b;">
                <div style="font-size: 3em; margin-bottom: 15px;">📊</div>
                <h3>Загружаем статистику...</h3>
            </div>
        </div>
    </div>

    <div id="saleModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAnyModal('saleModal')">&times;</span>
            <div id="saleModalContent"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase.js"></script>
    <script src="security.js"></script>
    <script src="script.js?v=20250115"></script>
    
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            if (typeof generateReport === 'function') {
                console.log('📊 Автоматически загружаем статистику...');
                generateReport();
            } else {
                console.error('❌ Функция generateReport не найдена!');
            }
        }, 800);
    });
    </script>
</body>
</html>
